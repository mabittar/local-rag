services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: localrag-postgres
    environment:
      POSTGRES_USER: localrag
      POSTGRES_PASSWORD: localrag123
      POSTGRES_DB: localrag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U localrag -d localrag" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: localrag-backend
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://localrag:localrag123@postgres:5432/localrag
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: localrag-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  e2e-tests:
    build: ./e2e-tests
    container_name: localrag-e2e
    environment:
      - BASE_URL=http://frontend:80
      - API_URL=http://backend:8000
    depends_on:
      - frontend
    profiles:
      - test

volumes:
  pgdata:
    driver: local
