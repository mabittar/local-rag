services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: localrag-postgres
    environment:
      POSTGRES_USER: localrag
      POSTGRES_PASSWORD: localrag123
      POSTGRES_DB: localrag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./init_db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U localrag -d localrag" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
